# HipTR base configuration. Mirrors src/hiptr/config.py dataclasses.
# Load it yourself (yaml -> HipTRConfig) or treat it as documentation of the knobs.

vision:
  variant: L            # B/L/SO/g (no S in v2); L/14 -> 1024-dim recommended
  patch_size: 14
  embed_dim: 1024       # B=768, L=1024, SO=1152, g=1536
  feature_mode: intermediate   # intermediate (get_intermediate_layers) | standard | value
  freeze: true
  # Loads from HF: google/tipsv2-{b14,l14,so400m14,g14}-dpt (trust_remote_code=True).
  # Auth via env HF_TIPSv2 or HF_TOKEN. Preprocessing is ToTensor-only ([0,1]); no mean/std.

vision_input:
  mode: native          # native (aspect-preserving rect) | single (square) | anyres (tiles)
  native_target: 1372   # native: longer side resized toward this; both sides snapped to 28
  native_max_side: 1792
  native_min_side: 56
  resolution: 896       # single mode; must be a multiple of patch_size*pixel_shuffle (28)
  aspect: pad           # single: pad | squish
  tile_size: 448        # anyres
  max_tiles: 12         # anyres quality/cost dial
  use_thumbnail: true

connector:
  pixel_shuffle: 2      # 448 tile -> 32x32 patches -> 16x16 = 256 tokens/tile
  mlp_depth: 2
  activation: gelu

llm:
  model_id: Qwen/Qwen3.5-0.8B   # smallest Qwen3.5 (no 0.6B in 3.5); hidden_size 1024
  dtype: bfloat16
  attn_implementation: sdpa
  use_lora: true
  lora_r: 32
  lora_alpha: 64
  lora_dropout: 0.05

tokens:
  num_loc_bins: 1000
  image_token: "<image>"
  line_open: "<line>"
  line_close: "</line>"
  poly_open: "<poly>"
  poly_close: "</poly>"

data:
  img_dir: ./data/images
  xml_dir: ./data/alto_xml
  image_glob: "*.jpg"
  xml_glob: "*.xml"
  granularity: polygon  # "polygon" (recommended, Surya-style) | "line" (bbox) | "word"
  poly_max_points: 0    # >0 subsamples each polygon to at most this many vertices
  max_target_len: 2048

train:
  stage: align          # align -> sft -> encoder
  output_dir: ./checkpoints
  epochs: 5
  batch_size: 2
  grad_accum: 8
  lr_projector: 1.0e-3
  lr_llm: 1.0e-5
  lr_vision: 5.0e-6
  warmup_ratio: 0.03
  weight_decay: 0.0
  num_workers: 4
  seed: 0
